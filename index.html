<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Untuk Shabiyya ❤️</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      margin: 0;
      height: 100vh;
      background: linear-gradient(135deg, #ffd1dc, #ffe4ec);
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: Arial, sans-serif;
      overflow: hidden;
      text-align: center;
    }

    .box {
      background: white;
      padding: 30px;
      border-radius: 20px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
      position: relative;
      z-index: 2;
    }

    h1 {
      color: #e91e63;
      margin-bottom: 10px;
    }

    p {
      color: #555;
    }

    .btn {
      padding: 12px 25px;
      margin: 10px;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      cursor: pointer;
    }

    #yes {
      background: #e91e63;
      color: white;
    }

    #no {
      background: #999;
      color: white;
      position: absolute;
    }

    /* Love animation */
    .heart {
      position: fixed;
      bottom: -10px;
      color: #ff4d6d;
      font-size: 20px;
      animation: floatUp 5s linear infinite;
    }

    @keyframes floatUp {
      0% {
        transform: translateY(0);
        opacity: 1;
      }
      100% {
        transform: translateY(-100vh);
        opacity: 0;
      }
    }
  </style>
</head>
<body>

<!-- Musik -->
<iframe width="0" height="0" src="https://www.youtube.com/embed/2Vv-BfVoq4g?autoplay=1&loop=1&playlist=2Vv-BfVoq4g"></iframe>

<div class="box">
  <h1>💖 Shabiyya 💖</h1>
  <p>Aku ada sesuatu yang mau aku tanyain...</p>
  <h2>Mau jadi pacarku? 🥺</h2>

  <button class="btn" id="yes" onclick="yesClick()">Iya ❤️</button>
  <button class="btn" id="no" onmouseover="moveButton()">Enggak 😢</button>
</div>

<script>
  function yesClick() {
    document.body.innerHTML = `
      <div style="text-align:center;">
        <h1 style="color:#e91e63;">AKU SENENG BANGET!! 😭❤️</h1>
        <p>Sekarang Shabiyya resmi jadi pacarku 💖</p>
      </div>
    `;
  }

  function moveButton() {
    let btn = document.getElementById("no");
    let x = Math.random() * (window.innerWidth - 100);
    let y = Math.random() * (window.innerHeight - 50);
    btn.style.left = x + "px";
    btn.style.top = y + "px";
  }

  // animasi love
  setInterval(() => {
    let heart = document.createElement("div");
    heart.className = "heart";
    heart.innerHTML = "💖";
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.fontSize = (15 + Math.random() * 20) + "px";
    document.body.appendChild(heart);

    setTimeout(() => {
      heart.remove();
    }, 5000);
  }, 300);
</script>

</body>
</html>
